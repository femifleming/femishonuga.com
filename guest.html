<br/><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guestbook</title>
<style>
  body {
    background-image: url('gbbg.gif');
  }
  #guestbook {
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
  }
  input[type="text"], textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    box-sizing: border-box;
  }
  button {
    padding: 10px 20px;
    color: white;
    border: none;
    cursor: pointer;
    background-color: #4CAF50;
  }
  button:hover {
    background-color: #779654;
  }
  .comment {
    margin-bottom: 20px;
    padding: 10px;
    border-radius: 5px;
    transition: filter 1s ease-in-out;
  }
  .comment:hover {
    filter: blur(100px);
  }
</style>
</head>
<body>
<div id="guestbook" align="center">
  <h2>Guestbook</h2>
  <form id="guestbookForm">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required>
    <label for="comment">Comment:</label>
    <textarea id="comment" name="comment" rows="4" required></textarea>
    <button type="submit">Submit</button>
    <br>
    <br>
  </form>
  <div id="comments"></div>
</div>
<br>
<br>
<script>
  document.getElementById("guestbookForm").addEventListener("submit", function(event) {
    event.preventDefault();
    // Get form values
    const name = document.getElementById("name").value;
    const comment = document.getElementById("comment").value;
    const dateTime = new Date().toLocaleString();
    // Define an array of colors
    const colors = ['#78866B', '#A9BA9D', '#D0D9CD', '#B2BEB5', '#828E84', '#687169'];
    // Generate random index to pick a color from the array
    const randomIndex = Math.floor(Math.random() * colors.length);
    const randomColor = colors[randomIndex];
    // Generate random font
    const fonts = ['Arial', 'Helvetica', 'Times New Roman', 'Georgia', 'Courier New'];
    const randomFont = fonts[Math.floor(Math.random() * fonts.length)];
    // Generate random border size between 1 and 10 pixels
    const randomBorderSize = Math.floor(Math.random() * 10) + 1;
    // Create a new comment element
    const commentContainer = document.createElement("div");
    commentContainer.classList.add("comment");
    commentContainer.style.backgroundColor = randomColor; // Apply random background color
    commentContainer.style.borderWidth = `${randomBorderSize}px`; // Apply random border size
    commentContainer.style.fontFamily = randomFont; // Apply random font
    commentContainer.innerHTML = `
      <h3>${name} - ${dateTime}</h3>
      <p>${comment}</p>
    `;
    // Insert the comment element at the beginning of the comments container
    document.getElementById("comments").prepend(commentContainer);
    // Save the entry to local storage
    saveEntry(name, comment, dateTime, randomColor, randomFont);
    // Clear form fields
    document.getElementById("guestbookForm").reset();
  });
  // Function to save entry to local storage
  function saveEntry(name, comment, dateTime, color, font) {
    let entries = JSON.parse(localStorage.getItem("guestbookEntries")) || [];
    entries.unshift({ name, comment, dateTime, color, font });
    localStorage.setItem("guestbookEntries", JSON.stringify(entries));
  }
  // Function to load entries from local storage
  function loadEntries() {
    const entries = JSON.parse(localStorage.getItem("guestbookEntries")) || [];
    // Sort entries by dateTime in descending order (most recent first)
    entries.sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime));
    entries.forEach(entry => {
      const commentContainer = document.createElement("div");
      commentContainer.classList.add("comment");
      commentContainer.style.backgroundColor = entry.color; // Apply saved background color
      commentContainer.style.borderWidth = `${entry.borderSize}px`; // Apply saved border size
      commentContainer.style.fontFamily = entry.font; // Apply saved font
      commentContainer.innerHTML = `
        <h3>${entry.name} - ${entry.dateTime}</h3>
        <p>${entry.comment}</p>
      `;
      document.getElementById("comments").appendChild(commentContainer);
    });
  }
  // Load entries when the page is loaded
  window.onload = loadEntries;
</script>
</body>
