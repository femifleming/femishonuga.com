<br/><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Guestbook</title>
<style>
  body {
    background-image: url('gbbg.gif');
  }
  #guestbook {
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
  }
  input[type="text"], textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    box-sizing: border-box;
  }
  button {
    padding: 10px 20px;
    color: white;
    border: none;
    cursor: pointer;
    background-color: #4CAF50;
  }
  button:hover {
    background-color: #779654;
  }
  .comment {
    margin-bottom: 20px;
    padding: 10px;
    border-radius: 5px;
    transition: filter 1s ease-in-out;
  }
  .comment:hover {
    filter: blur(100px);
  }
</style>
</head>
<body>
<div id="guestbook" align="center">
  <h2>Guestbook</h2>
  <form id="guestbookForm">
    <label for="name">Name:</label>
    <input type="text" id="name" name="name" required>
    <label for="comment">Comment:</label>
    <textarea id="comment" name="comment" rows="4" required></textarea>
    <button type="submit">Submit</button>
    <br>
    <br>
  </form>
  <div id="comments"></div>
</div>
<br>
<br>
<div align="center">
<img src="felixguest.gif">
</div>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js"></script>
<script>
  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyD_MGht4maqgQf0HGicB6giSyZXynAOmcs",
    authDomain: "guest-9c6a7.firebaseapp.com",
    databaseURL: "https://guest-9c6a7-default-rtdb.firebaseio.com/",
    projectId: "guest-9c6a7",
    storageBucket: "guest-9c6a7.appspot.com",
    messagingSenderId: "723200890475",
    appId: "1:723200890475:web:b273d3888b751b0488c32e"
  };
  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const database = firebase.database();
  document.getElementById("guestbookForm").addEventListener("submit", function(event) {
    event.preventDefault();
    // Get form values
    const name = document.getElementById("name").value;
    const comment = document.getElementById("comment").value;
    const dateTime = new Date().toLocaleString();
    // Generate random color
    const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16);
    // Generate random font
    const fonts = ['Arial', 'Helvetica', 'Times New Roman', 'Georgia', 'Courier New'];
    const randomFont = fonts[Math.floor(Math.random() * fonts.length)];
    // Create a new comment object
    const newComment = {
      name: name,
      comment: comment,
      dateTime: dateTime,
      color: randomColor,
      font: randomFont
    };
    // Save the comment to the database
    database.ref('comments').push(newComment);
    // Clear form fields
    document.getElementById("guestbookForm").reset();
  });
  // Function to load comments from the database
  function loadComments() {
    database.ref('comments').on('value', function(snapshot) {
      const comments = snapshot.val();
      document.getElementById("comments").innerHTML = ''; // Clear previous comments
      for (let key in comments) {
        const comment = comments[key];
        const commentContainer = document.createElement("div");
        commentContainer.classList.add("comment");
        commentContainer.style.backgroundColor = comment.color;
        commentContainer.style.fontFamily = comment.font;
        commentContainer.innerHTML = `
          <h3>${comment.name} - ${comment.dateTime}</h3>
          <p>${comment.comment}</p>
        `;
        document.getElementById("comments").appendChild(commentContainer);
      }
    });
  }
  // Load comments when the page is loaded
  window.onload = loadComments;
</script>
</body>
