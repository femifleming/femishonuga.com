<!DOCTYPE html>
<html>

<head>
    <title>Gallery</title>
    <style>
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 40px auto;
        }
        
        .folder {
            margin: 20px;
        }
        
        .folder img {
            display: block;
            margin: auto;
            max-width: 200px;
            max-height: 200px;
        }
        
        .folder h2 {
            text-align: center;
        }
        
        h2 {
            font-weight: bold;
            font-size: 1.1em;
            color: #ffffff;
            background-color: rgba(0, 0, 0, 0.59);
        }
        
        table {
            width: 200px;
            height: 180px;
            background-color: rgba(0, 0, 0, 0.59);
        }
        
        hr {
            margin-top: 2em;
            border: none;
            background-color: #555;
            color: #555;
            height: 1px;
        }
        
        a {
            color: #aaa;
        }
        
        a:hover {
            color: #ccc;
        }
        
        img {
            margin-top: -0.5em;
            max-width: 100%;
        }
        
        input {
            font-family: inherit;
        }
        
        body {
            background-color: #111;
            max-width: 800px;
            color: #ddd;
            font-family: 'Tiems New Roman';
            font-size: 1.0em;
            margin: 40px auto;
            padding: 0 10px;
        }
        
        pre {
            font-size: 1.0em;
            color: #ddd;
        }
        
        section {
            backgroud-color: rgba(43, 44, 54, 0.4);
        }
        
        #BLUE {
            backgroud-color: rgba(43, 44, 54, 0.4);
        }
        
        article {
            background-color: rgba(19, 19, 26, 0.5);
            /* Even darker background for articles */
            padding: 10px;
            z-index: 2;
            transition: filter s ease;
            /* Smooth transition for the filter application */
        }
    </style>
</head>
