<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallpaper Download</title>
    <style>
        body {
		align: center;
            font-family: Times New Roman, serif;
            display: flex;
            flex-wrap: wrap;
           color: black;
	   font-weight: 2em;
	    justify-content: center;
            background-color: #f0f0f0;
            margin: 40px auto;
	    font-style: italic;
	    max-width: 800px;
	    padding: 0 20px;
	    background-attachment: fixed;
	}
        .wallpaper-container {
            background: #ffffff;
            margin: 10px;
	    color: black;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 1200px;
            width: 100%;
            text-align: right;
                    transition: background 1s ease, color 1s ease;
	}
        .wallpaper-container img {
            max-width: 100%;
            border-radius: 8px;
	    color: white;
	}
	.wallpaper-container:hover {
		background: #838472;
	}
        .wallpaper-info {
            margin-top: 10px;
            text-align: left;
        }
        .download-link {
            display: block;
            margin-top: 10px;
            padding: 10px;
            background: #379472;
            color: white;
            text-decoration: none;
            border-radius: 5px;
	    transition: background 1s ease;
	}
        .download-link:hover {
            background: #382745;
        }
	img {
border-radius: 20px;
transition: border-radius 1s ease;
	}
	img:hover {
border-radius: 50%;
	}
    </style>
</head>
<body background="feetgif.gif">
	<marquee style="color: white; background-color: #958431;">
	This page takes a long time to load, please be patient... thumbnails are a work in progress...
	</marquee>

	<script>
    function fetchImages() {
        // Use a relative path assuming images are in the same directory
        const images = [
            'wp1.jpg',
            'wp2.jpg',
            'wp3.jpg',
            'wp4.jpg',
            'wp5.jpg',
            'wp6.jpg',
            'wp7.jpg',
            'wp8.jpg',
            'wp9.jpg',
            'wp10.jpg',
            'wp11.jpg',
            'wp12.jpg',
            'wp13.jpg',
            'wp14.jpg', 
            'wp15.jpg',
		'wp16.jpg',
		'wp17.jpg',
		'wp18.jpg',
        ];
        const container = document.body;

        images.forEach(image => {
            const img = new Image();
            img.src = `thumbnails/${image}`;
            img.onload = () => {
                const imageContainer = document.createElement('div');
                imageContainer.className = 'wallpaper-container';

                const imageElement = document.createElement('img');
                imageElement.src = `thumbnails/${image}`;
                imageContainer.appendChild(imageElement);

                const infoContainer = document.createElement('div');
                infoContainer.className = 'wallpaper-info';

                // Fetch metadata (example: file name and size)
                const imageName = document.createElement('p');
                imageName.textContent = `File name: ${image}`;
                infoContainer.appendChild(imageName);

                const imageSize = document.createElement('p');
                const imgFull = new Image();
                imgFull.src = image;
                imgFull.onload = () => {
                    imageSize.textContent = `Size: ${imgFull.naturalWidth} x ${imgFull.naturalHeight} pixels`;
                    infoContainer.appendChild(imageSize);
                };

                imageContainer.appendChild(infoContainer);

                const downloadLink = document.createElement('a');
                downloadLink.href = image;
                downloadLink.className = 'download-link';
                downloadLink.textContent = 'Download Full Quality';
                imageContainer.appendChild(downloadLink);

                container.appendChild(imageContainer);
            };
        });
    }

    window.onload = fetchImages;
</script>
</body>
</html>
